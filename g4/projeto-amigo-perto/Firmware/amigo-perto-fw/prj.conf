# Logger module
CONFIG_LOG=y

# Button and LED library
CONFIG_DK_LIBRARY=y

# Bluetooth LE
CONFIG_BT=y

CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Amigo Perto"

# Increase stack size for the main thread and System Workqueue
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_MAIN_STACK_SIZE=2048

# GPIO (LEDs)
CONFIG_GPIO=y

# PWM Support
CONFIG_PWM=y

# ADC Support for battery monitoring
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y

# Power Management for Low Energy (nRF52840)
CONFIG_PM=y
CONFIG_PM_DEVICE=y

# Tickless reduz wakeups do kernel em idle (mais relevante que ajustar ticks/seg no nRF)
CONFIG_TICKLESS_KERNEL=y

# Enable DCDC converter via devicetree (reduz consumo em ~40% no nRF52840)
# Note: CONFIG_SOC_DCDC_NRF52X is set automatically via devicetree overlay
# CONFIG_SOC_DCDC_NRF52X=y

# BLE TX power (controlador) — fixa a potência de transmissão do rádio.
# Para o nRF52840 o máximo é +8 dBm. Isto se aplica a advertising e conexões.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
